<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Пасхалка</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: #b30000;
      font-family: 'Creepster', cursive, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }

    .content {
      background: #000;
      padding: 30px;
      border-radius: 20px;
      border: 2px solid #330000;
      box-shadow: 0 0 50px #440000;
      max-width: 90%;
    }

    img {
      max-width: 100%;
      max-height: 70vh;
      object-fit: contain;
      border: 2px solid #660000;
      margin-bottom: 20px;
      display: block;
    }

    h1 {
      font-size: 3rem;
      text-shadow: 0 0 20px red;
      margin: 0;
    }

    .error-msg {
      color: #888;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="content">
    <!-- Картинка -->
    <img src="surprise.jpg" alt="Пасхалка" id="easterImg" 
         onerror="this.style.display='none'; document.getElementById('noImg').style.display='block';">

    <!-- Если картинка не загрузилась -->
    <div id="noImg" style="display: none; color: #660000; font-size: 1.5rem;">
     Изображение не найдено, но ты всё равно нашла пасхалку!
    </div>

    <h1>мне лень дальше</h1>
  </div>

  <!-- Аудио (замени на свою песню) -->
  <audio autoplay loop>
    <source src="song.mp3" type="audio/mpeg">
  </audio>
</body>
</html>
