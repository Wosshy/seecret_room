<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Пасхалка</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #0a0a0a; /* тёмный фон, если картинка не загрузится */
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Creepster', cursive, sans-serif;
      color: #b30000;
      overflow: auto;
    }

    .wrapper {
      text-align: center;
      max-width: 100%;
      max-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .image-box {
      max-width: 90vw;
      max-height: 80vh;
      margin-bottom: 20px;
    }

    .easter-image {
      max-width: 100%;
      max-height: 80vh;
      object-fit: contain;  /* картинка полностью видна */
      border: 2px solid #330000;
      box-shadow: 0 0 40px #330000;
      display: block;
    }

    /* Если картинка не загрузилась — скрыть её и показать текст */
    .easter-image.error {
      display: none;
    }

    .message {
      font-size: 4rem;
      text-shadow: 0 0 30px red;
      margin-top: 10px;
      background: rgba(0,0,0,0.7);
      padding: 10px 30px;
      border-radius: 10px;
    }

    .fallback-text {
      font-size: 2rem;
      color: #660000;
      display: none;
    }
    .fallback-text.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="image-box">
      <!-- Картинка; если не загружается, скроется и покажется fallback -->
      <img class="easter-image" src="mell.jpg" alt="Пасхалка" 
           onerror="this.classList.add('error'); document.querySelector('.fallback-text').classList.add('show');">
    </div>
    <div class="fallback-text">Здесь должна была быть посхалка, но картинка потерялась </div>
    <div class="message">g</div>
  </div>

  <!-- Песня (замени src на свою) -->
  <audio autoplay loop>
    <source src="temny.mp3" type="audio/mpeg">
  </audio>
</body>
</html>
