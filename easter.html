<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎃</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: auto;           /* если картинка больше экрана, появится прокрутка */
    }

    .image-container {
      max-width: 100vw;
      max-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;            /* небольшой отступ, чтобы картинка не прилипала */
    }

    .easter-image {
      max-width: 100%;
      max-height: 100vh;
      object-fit: contain;      /* вписывает картинку целиком, без обрезки */
      display: block;
      box-shadow: 0 0 40px #330000;  /* мрачное свечение по желанию */
    }

    /* Текст поверх (можешь убрать или отредактировать) */
    .message {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #b30000;
      font-family: 'Creepster', cursive;
      font-size: 3rem;
      text-shadow: 0 0 20px red;
      background: rgba(0,0,0,0.7);
      padding: 10px 30px;
      border-radius: 8px;
      z-index: 2;
      text-align: center;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- Контейнер, чтобы картинка не выходила за пределы -->
  <div class="image-container">
    <!-- ЗАМЕНИ НА СВОЮ КАРТИНКУ -->
    <img class="easter-image" src="surprise.jpg" alt="Пасхалка">
  </div>

  <!-- Песня (название файла замени на своё) -->
  <audio autoplay loop>
    <source src="song.mp3" type="audio/mpeg">
  </audio>
</body>
</html>
