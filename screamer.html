<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: black;
      overflow: hidden;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #screamer {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 10;
    }
    #question {
      display: none;
      position: fixed;
      bottom: 20%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      text-align: center;
      background: rgba(0,0,0,0.8);
      padding: 30px;
      border-radius: 15px;
      border: 2px solid #330000;
      color: #b30000;
      font-family: 'Creepster', cursive;
    }
    #question h2 {
      font-size: 2.5rem;
      text-shadow: 0 0 20px red;
      margin-bottom: 15px;
    }
    #answer {
      font-size: 2rem;
      background: #111;
      border: 2px solid #660000;
      color: #cc0000;
      text-align: center;
      padding: 5px 15px;
      width: 200px;
      outline: none;
    }
    button {
      background: #1a0000;
      border: 2px solid #660000;
      color: #b30000;
      font-size: 1.5rem;
      padding: 5px 20px;
      cursor: pointer;
      margin-left: 10px;
      text-shadow: 0 0 10px red;
    }
    .error {
      color: #ff3333;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <img id="screamer" src="jeff.jpg" alt="Джефф">
  <div id="question">
    <h2>КТО ПРИХОДИТ ВО СНЕ?</h2>
    <div>
      <input type="text" id="answer" placeholder="..." autofocus>
      <button id="submitAnswer">ОТВЕТ</button>
    </div>
    <div class="error" id="errorMsg"></div>
  </div>

  <!-- Громкий звук скримера (один раз) -->
  <audio id="screamAudio" autoplay>
    <source src="scream.mp3" type="audio/mpeg">
  </audio>

  <script>
    const screamer = document.getElementById('screamer');
    const question = document.getElementById('question');
    const answer = document.getElementById('answer');
    const submitBtn = document.getElementById('submitAnswer');
    const errorMsg = document.getElementById('errorMsg');
    const scream = document.getElementById('screamAudio');

    // Скример показывается 3 секунды, затем появляется загадка
    setTimeout(() => {
      screamer.style.display = 'none';
      question.style.display = 'block';
      answer.focus();
    }, 3000);

    function checkAnswer() {
      if (answer.value.trim().toUpperCase() === "JEFF") {
        window.location.href = 'easter.html';
      } else {
        errorMsg.textContent = '⛧ НЕВЕРНО ⛧';
        answer.value = '';
        answer.focus();
      }
    }

    submitBtn.addEventListener('click', checkAnswer);
    answer.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') checkAnswer();
    });

    // Чтобы звук точно проигрался после взаимодействия
    window.addEventListener('load', () => {
      scream.play().catch(() => {});
    });
  </script>
</body>
</html>
