<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>64 65 61 64</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #020202;
      color: #8b0000;
      font-family: 'Special Elite', monospace;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background-image: radial-gradient(circle at 30% 40%, #1a0000 0%, #000 90%);
      cursor: crosshair;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.2) 0px, rgba(0,0,0,0.2) 2px, 
                                              transparent 2px, transparent 4px);
      pointer-events: none;
      z-index: 2;
    }

    h1 {
      font-family: 'Creepster', cursive;
      font-size: 4.5rem;
      text-shadow: 0 0 20px #ff0000, 0 0 60px #4a0000;
      letter-spacing: 10px;
      margin-bottom: 40px;
      animation: glitch 3s infinite;
      user-select: none;
    }

    @keyframes glitch {
      0%, 100% { transform: translate(0); }
      20% { transform: translate(-4px, 4px); }
      40% { transform: translate(4px, -4px); }
      60% { transform: translate(-4px, -3px); }
      80% { transform: translate(4px, 3px); }
    }

    .input-box {
      background: #0b0b0b;
      border: 2px solid #3b0000;
      padding: 25px 45px;
      box-shadow: inset 0 0 40px #220000, 0 0 30px #000;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    #password {
      background: transparent;
      border: none;
      border-bottom: 2px solid #660000;
      color: #cc0000;
      font-family: 'Special Elite', monospace;
      font-size: 2rem;
      text-align: center;
      outline: none;
      width: 240px;
      caret-color: red;
      letter-spacing: 4px;
    }

    #password::placeholder {
      color: #3a0000;
      font-size: 1.3rem;
      letter-spacing: 2px;
    }

    button {
      background: #110000;
      border: 2px solid #660000;
      color: #cc0000;
      font-family: 'Creepster', cursive;
      font-size: 1.8rem;
      padding: 6px 25px;
      cursor: pointer;
      transition: 0.3s;
      text-shadow: 0 0 15px red;
    }

    button:hover {
      background: #2a0000;
      box-shadow: 0 0 30px #ff000066;
    }

    .error {
      color: #ff3333;
      margin-top: 25px;
      min-height: 35px;
      font-size: 1.4rem;
      text-shadow: 0 0 12px red;
    }

    .secret-corner {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 65px;
      height: 65px;
      opacity: 0;
      z-index: 99;
      cursor: default;
    }
  </style>
</head>
<body>
  <h1>ВХОД</h1>
  <div class="input-box">
    <input type="text" id="password" placeholder="•••••••" autofocus>
    <button id="submitBtn">ВОЙТИ</button>
  </div>
  <div class="error" id="errorMsg"></div>

  <!-- Невидимая зона (правый нижний угол) для перехода на страницу с телевизором -->
  <div class="secret-corner" id="secretCorner"></div>

  <!-- 
    
  -->
  <!-- ЗАКОДИРОВАННАЯ_ЧАСТЬ_1: 32 31 45 43 67 73 6d 6f 61 32 73 61 4d 6f 56 59 54 -->  

  <script>
    const FULL_PASSWORD = "SIFILIS";  // полный пароль
    const input = document.getElementById('password');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');
    const secretCorner = document.getElementById('secretCorner');

    function checkPassword() {
      const entered = input.value.trim();
      if (entered.toUpperCase() === FULL_PASSWORD) {
        window.location.href = 'easter.html';
      } else {
        errorMsg.textContent = '⛧ НЕВЕРНО ⛧';
        input.value = '';
        input.focus();
      }
    }

    submitBtn.addEventListener('click', checkPassword);
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') checkPassword();
    });

    // Секретный переход на tv.html (правый нижний угол)
    secretCorner.addEventListener('click', () => {
      window.location.href = 'tv.html';
    });

    // Дублирующий широкий обработчик для угла
    document.addEventListener('click', (e) => {
      const threshold = 65;
      if (e.clientX > window.innerWidth - threshold && e.clientY > window.innerHeight - threshold) {
        window.location.href = 'tv.html';
      }
    });
  </script>
</body>
</html>
